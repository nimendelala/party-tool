  .toolbar button {

    border: 1px solid #ddd;

    margin-bottom: 16px;

  }

  }

    font-size: 13px;

  .btn-cancel:active { background: #d0d0d0; }

  /* People list */

<script>
(function() {
  const STORAGE_KEY = 'contact_app_data';
  const API_BASE = '/api/data';
  let people = [];
  let editingId = null;

  // Cloud API storage engine
  var engine = (function() {
    // Returns a promise so callers can wait for the write to complete
    function save() {
      return fetch(API_BASE, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ students: people, tasks: tasks })
      });
    }

    // Save then double-sync to beat KV eventual consistency lag
    function saveAndSync(callback) {
      save().then(function() {
        engine.syncFromCloud(callback);
        // Second sync after 1.5s to catch up if first hit a stale edge node
        setTimeout(function() { engine.syncFromCloud(callback); }, 1500);
      }).catch(function() {
        engine.syncFromCloud(callback);
        setTimeout(function() { engine.syncFromCloud(callback); }, 1500);
      });
    }
    var saveTimer = null;
    function debouncedSave() {
      if (saveTimer) clearTimeout(saveTimer);
      save();
      saveTimer = setTimeout(function() { save(); }, 500);
    }

    // Load from API, fallback to localStorage
    function loadData(callback) {
      fetch(API_BASE + '?_=' + Date.now())
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var arr = data.students || data;
          if (Array.isArray(arr) && arr.length > 0) {
            people = arr;
          } else {
            // Fallback: try localStorage
            try {
              var raw = localStorage.getItem(STORAGE_KEY);
              if (raw) {
                var parsed = JSON.parse(raw);
                people = parsed.students || parsed;
                save();
              }
            } catch (e) { people = []; }
          }
          // Load tasks from same response
          if (Array.isArray(data.tasks)) {
            tasks = data.tasks;
          } else {
            try {
              var tr = localStorage.getItem(TASK_STORAGE_KEY);
              if (tr) { var tp = JSON.parse(tr); tasks = tp.tasks || []; }
            } catch (e) { tasks = []; }
          }
          callback();
        })
        .catch(function() {
          // Network error: use localStorage
          try {
            var raw = localStorage.getItem(STORAGE_KEY);
            if (raw) { var parsed = JSON.parse(raw); people = parsed.students || parsed; }
          } catch (e) { people = []; }
          try {
            var tr = localStorage.getItem(TASK_STORAGE_KEY);
            if (tr) { var tp = JSON.parse(tr); tasks = tp.tasks || []; }
          } catch (e) { tasks = []; }
          callback();
        });
    }

    function syncFromCloud(callback) {
      fetch(API_BASE + '?_=' + Date.now())
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (Array.isArray(data.students)) {
            people = data.students;
          }
          if (Array.isArray(data.tasks)) {
            tasks = data.tasks;
          }
          if (callback) callback(true);
        })
        .catch(function() {
          if (callback) callback(false);
        });
    }

    return { save: save, debouncedSave: debouncedSave, loadData: loadData, syncFromCloud: syncFromCloud, saveAndSync: saveAndSync };

  // Column name variants for flexible matching
  var colVariants = {
    name: ['姓名','名字','名称','学生姓名','学生名字','人员姓名','人员','联系人'],
    class: ['班级','班','班组','年级','专业','系别'],
    studentId: ['学号','当前状态','入党情况','状态','政治面貌','编号'],
    notes: ['备注','说明','附注','其他','描述','补充']
  };

  function norm(s) {
    // Remove all whitespace (spaces, tabs, non-breaking spaces, etc.)
    return s.replace(/[\s 　]+/g, '');
  }

  function findCol(headers, keys) {
    // First try exact match after normalization
    for (var k = 0; k < keys.length; k++) {
      for (var h = 0; h < headers.length; h++) {
        if (norm(headers[h]) === norm(keys[k])) return h;
      }
    }
    // Fallback: "contains" match (e.g., "学生姓名(必填)" contains "姓名")
    for (var k = 0; k < keys.length; k++) {
      for (var h = 0; h < headers.length; h++) {
        if (norm(headers[h]).indexOf(norm(keys[k])) !== -1) return h;
      }
    }
    return -1;
  }

  function parseRows(headers, rows) {
    var nameIdx = findCol(headers, colVariants.name);
    var classIdx = findCol(headers, colVariants.class);
    var sidIdx = findCol(headers, colVariants.studentId);
    var notesIdx = findCol(headers, colVariants.notes);

    if (nameIdx === -1) {
      alert('无法识别表格中的人名列。\n\n检测到的列名：' + headers.join('、') + '\n去除空格后：' + headers.map(norm).join('、') + '\n\n人名列请包含以下关键词之一：' + colVariants.name.join('、'));
      return null;
    }

    var result = [];
    for (var i = 0; i < rows.length; i++) {
      var vals = rows[i];
      result.push({
        id: genId() + i,
        name: (vals[nameIdx] || '').toString().trim(),
        class: classIdx !== -1 ? (vals[classIdx] || '').toString().trim() : '',
        studentId: sidIdx !== -1 ? (vals[sidIdx] || '').toString().trim() : '',
        notes: notesIdx !== -1 ? (vals[notesIdx] || '').toString().trim() : ''
      });
    }
    return result;
  }

  importFile.addEventListener('change', function() {
    var file = this.files[0];
    if (!file) return;
    var ext = file.name.split('.').pop().toLowerCase();
    var reader = new FileReader();

    reader.onload = function(e) {
      var imported;

      if (ext === 'json') {
        try {
          imported = JSON.parse(e.target.result);
          if (!Array.isArray(imported)) throw new Error();

      if (ext === 'xlsx' || ext === 'xls') {

        try {
          var wb = XLSX.read(e.target.result, { type: 'array' });
          var sheetName = wb.SheetNames[0];
          var sheet = wb.Sheets[sheetName];
          var data = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
          if (data.length < 2) { alert('表格为空或只有一行'); return; }

          // Collect all known header keywords for scoring
          var allKeywords = [];
          Object.keys(colVariants).forEach(function(k) {
            allKeywords = allKeywords.concat(colVariants[k]);
          });

          // Score each row: how many header keywords does it contain?
          var bestIdx = -1;
          var bestScore = 0;
          for (var r = 0; r < Math.min(data.length, 20); r++) {
            var score = 0;
            var rowVals = data[r].map(function(c) { return norm(String(c || '')); });
            for (var c = 0; c < rowVals.length; c++) {
              for (var k = 0; k < allKeywords.length; k++) {
                if (rowVals[c].indexOf(norm(allKeywords[k])) !== -1) {
                  score++;
                  break;
                }
              }
            }
            if (score > bestScore) { bestScore = score; bestIdx = r; }
          }

          if (bestIdx === -1 || bestScore === 0) {
            alert('未在表格前20行中找到包含姓名、学号等关键词的列名行。\n请确认表格有表头行。');
            return;
          }

          var headers = data[bestIdx].map(function(h) { return String(h).trim(); });

          // Collect data rows after header, skip empty rows
          function hasContent(row) {
            for (var c = 0; c < row.length; c++) {
              var v = String(row[c] || '').trim();
              if (v && v.indexOf('__EMPTY') !== 0) return true;
            }
            return false;
          }
          var rows = [];
          for (var r = bestIdx + 1; r < data.length; r++) {
            if (hasContent(data[r])) rows.push(data[r]);
          }
          if (rows.length === 0) { alert('表格中没有数据行'); return; }

          imported = parseRows(headers, rows);
          if (imported) mergeImport(imported);
        } catch (err) {
          alert('Excel 文件解析失败，请确认文件格式正确');
        }
        }); // end loadXlsx
        return;
      }

      // CSV
      var text = e.target.result;
      var lines = text.split(/\r?\n/).filter(function(l) { return l.trim(); });
      if (lines.length < 2) { alert('文件为空或格式不对'); return; }
      var headerLine = lines[0];
      if (headerLine.charCodeAt(0) === 0xFEFF) headerLine = headerLine.slice(1);
      var headers = headerLine.split(',').map(function(h) { return h.trim().replace(/^"|"$/g, ''); });
      var rows = [];
      for (var i = 1; i < lines.length; i++) {
        rows.push(parseCSVLine(lines[i]));
      }
      imported = parseRows(headers, rows);
      if (imported) mergeImport(imported);
    };

    if (ext === 'xlsx' || ext === 'xls') {
      reader.readAsArrayBuffer(file);
    } else {
      reader.readAsText(file);
    }
    importFile.value = '';
  });

  function parseCSVLine(line) {
    var result = [];
    var current = '';
    var inQuotes = false;
    for (var i = 0; i < line.length; i++) {
      var ch = line[i];
      if (inQuotes) {
        if (ch === '"') {
          if (i + 1 < line.length && line[i + 1] === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = false;
          }
        } else {
          current += ch;
        }
      } else {
        if (ch === '"') {
          inQuotes = true;
        } else if (ch === ',') {
          result.push(current.trim());
          current = '';
        } else {
          current += ch;
        }
      }
    }
    result.push(current.trim());
    return result;
  }

  var taskEngine = (function() {
    function save() {
      return fetch(API_BASE, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ students: people, tasks: tasks })
      });
    }
    function saveAndSync(callback) {
      save().then(function() {
        engine.syncFromCloud(callback);
        setTimeout(function() { engine.syncFromCloud(callback); }, 1500);
      }).catch(function() {
        engine.syncFromCloud(callback);
        setTimeout(function() { engine.syncFromCloud(callback); }, 1500);
      });
    }
    var saveTimer = null;
    function debouncedSave() {
      if (saveTimer) clearTimeout(saveTimer);
      save();
      saveTimer = setTimeout(function() { save(); }, 500);
    }
    function loadData(callback) {
      // Tasks are loaded together with students via engine.loadData
      // This just provides the save API, actual loading is in engine.loadData
      callback();
    }
    return { save: save, debouncedSave: debouncedSave, loadData: loadData, syncFromCloud: engine.syncFromCloud, saveAndSync: saveAndSync };
  })();

  // Task render
  var taskListEl = document.getElementById('taskList');
  var taskCountEl = document.getElementById('taskCount');
  var taskSearchInput = document.getElementById('taskSearchInput');

  function renderTasks(filter) {
    var q = (filter || '').toLowerCase().trim();
    var filtered = q
      ? tasks.filter(function(t) {
          return (t.title || '').toLowerCase().indexOf(q) !== -1
            || (t.workDate || '').toLowerCase().indexOf(q) !== -1
            || (t.notes || '').toLowerCase().indexOf(q) !== -1;
        })
      : tasks.slice();

    filtered.sort(function(a, b) {
      if (a.completed !== b.completed) return a.completed ? 1 : -1;
      return (b.createdAt || '').localeCompare(a.createdAt || '');
    });

    var completedCount = filtered.filter(function(t) { return t.completed; }).length;
    taskCountEl.textContent = '共 ' + filtered.length + ' 项任务'
      + (completedCount > 0 ? '（已完成 ' + completedCount + ' 项）' : '')
      + (q ? '（搜索结果）' : '');

    if (filtered.length === 0) {
      taskListEl.innerHTML = '<div class="empty"><div class="icon">📋</div>还没有任务，点击上方按钮添加</div>';
      return;
    }

    taskListEl.innerHTML = filtered.map(function(t) {
      var completedClass = t.completed ? ' completed' : '';
      return '<div class="task-card' + completedClass + '" data-id="' + t.id + '">'
        + '<div class="task-check" data-action="toggle"></div>'
        + '<div class="task-body" data-action="edit">'
        + '<div class="task-title">' + esc(t.title || '(未命名)') + '</div>'
        + (t.workDate ? '<div class="task-date">' + esc(t.workDate) + '</div>' : '')
        + (t.notes ? '<div class="task-notes">' + esc(t.notes) + '</div>' : '')
        + '</div>'
        + '<button class="task-delete" data-action="delete" title="删除任务">×</button>'
        + '</div>';
    }).join('');
  }

  // Task CRUD
  var taskModal = document.getElementById('taskModal');
  var taskModalTitle = document.getElementById('taskModalTitle');
  var ftaskTitle = document.getElementById('ftaskTitle');
  var ftaskDate = document.getElementById('ftaskDate');
  var ftaskNotes = document.getElementById('ftaskNotes');
  var btnTaskSave = document.getElementById('btnTaskSave');
  var btnTaskCancel = document.getElementById('btnTaskCancel');
  var btnTaskDelete = document.getElementById('btnTaskDelete');

  function openTaskModal(task) {
    taskEditingId = task ? task.id : null;
    taskModalTitle.textContent = task ? '编辑任务' : '添加任务';
    ftaskTitle.value = task ? task.title : '';
    ftaskDate.value = task ? (task.workDate || '') : '';
    ftaskNotes.value = task ? task.notes : '';
    btnTaskDelete.style.display = task ? '' : 'none';
    taskModal.classList.add('active');
    ftaskTitle.focus();
  }

  function closeTaskModal() {
    taskModal.classList.remove('active');
    taskEditingId = null;
  }

  function saveTask() {
    var title = ftaskTitle.value.trim();
    if (!title) { alert('请至少填写任务名称'); return; }

    var existing = taskEditingId ? tasks.find(function(t) { return t.id === taskEditingId; }) : null;
    var data = {
      id: taskEditingId || genId(),
      title: title,
      workDate: ftaskDate.value,
      notes: ftaskNotes.value.trim(),
      completed: existing ? existing.completed : false,
      createdAt: existing ? existing.createdAt : new Date().toISOString(),
      updatedAt: new Date().toISOString()
    };

    if (taskEditingId) {
      var idx = tasks.findIndex(function(t) { return t.id === taskEditingId; });
      if (idx !== -1) tasks[idx] = data;
    } else {
      tasks.push(data);
    }

    taskEngine.saveAndSync(function() { renderTasks(taskSearchInput.value); });
    closeTaskModal();
    renderTasks(taskSearchInput.value);
  }

  function deleteTask() {
    if (!taskEditingId) return;
    if (!confirm('确定删除该任务吗？')) return;
    tasks = tasks.filter(function(t) { return t.id !== taskEditingId; });
    taskEngine.saveAndSync(function() { renderTasks(taskSearchInput.value); });
    closeTaskModal();
    renderTasks(taskSearchInput.value);
  }

  function toggleTaskComplete(id) {
    var task = tasks.find(function(t) { return t.id === id; });
    if (task) {
      task.completed = !task.completed;
      task.updatedAt = new Date().toISOString();
      taskEngine.debouncedSave();
      renderTasks(taskSearchInput.value);
      setTimeout(function() { engine.syncFromCloud(function() { renderTasks(taskSearchInput.value); }); }, 800);
    }
  }

  // Task event listeners
  document.getElementById('taskAddBtn').addEventListener('click', function() {
    openTaskModal(null);
  });
  btnTaskCancel.addEventListener('click', closeTaskModal);
  btnTaskSave.addEventListener('click', saveTask);
  btnTaskDelete.addEventListener('click', deleteTask);
  taskModal.addEventListener('click', function(e) {
    if (e.target === taskModal) closeTaskModal();
  });
  taskSearchInput.addEventListener('input', function() {
    renderTasks(this.value);
  });
  taskListEl.addEventListener('click', function(e) {
    var actionEl = e.target.closest('[data-action]');
    var card = e.target.closest('.task-card');
    if (!card) return;
    var id = card.getAttribute('data-id');

    if (actionEl) {
      var action = actionEl.getAttribute('data-action');
      if (action === 'toggle') {
        toggleTaskComplete(id);
        return;
      }
      if (action === 'delete') {
        if (!confirm('确定删除该任务吗？')) return;
        tasks = tasks.filter(function(t) { return t.id !== id; });
        taskEngine.saveAndSync(function() { renderTasks(taskSearchInput.value); });
        renderTasks(taskSearchInput.value);
        return;
      }
      if (action === 'edit') {
        var t = tasks.find(function(t) { return t.id === id; });
        if (t) openTaskModal(t);
        return;
      }
    }

    var t = tasks.find(function(t) { return t.id === id; });
    if (t) openTaskModal(t);
  });

  // Refresh buttons
  document.getElementById('btnRefreshStudents').addEventListener('click', function() {
    var btn = this;
    if (btn.disabled) return;
    btn.disabled = true;
    btn.textContent = '同步中...';
    markEditing(true);
    engine.syncFromCloud(function(ok) {
      render(searchInput.value);
      markEditing(false);
      btn.textContent = '已刷新';
      setTimeout(function() { btn.textContent = '刷新'; btn.disabled = false; }, 800);
    });
  });
  document.getElementById('btnRefreshTasks').addEventListener('click', function() {
    var btn = this;
    if (btn.disabled) return;
    btn.disabled = true;
    btn.textContent = '同步中...';
    markEditing(true);
    engine.syncFromCloud(function(ok) {
      renderTasks(taskSearchInput.value);
      markEditing(false);
      btn.textContent = '已刷新';
      setTimeout(function() { btn.textContent = '刷新'; btn.disabled = false; }, 800);
    });
  });

  // Pause auto-sync while editing
  var origOpenStudent = openModal;
  openModal = function(person) {
    markEditing(true);
    origOpenStudent(person);
  };
  var origCloseStudent = closeModal;
  closeModal = function() {
    markEditing(false);
    origCloseStudent();
  };
  var origOpenTask = openTaskModal;
  openTaskModal = function(task) {
    markEditing(true);
    origOpenTask(task);
  };
  var origCloseTask = closeTaskModal;
  closeTaskModal = function() {
    markEditing(false);
    origCloseTask();
  };
  var origOpenBatch = openBatchEditModal;
  openBatchEditModal = function() {
    markEditing(true);
    origOpenBatch();
  };
  var origCloseBatch = closeBatchEditModal;
  closeBatchEditModal = function() {
    markEditing(false);
    origCloseBatch();
  };

  // ====== Auth ======
  var loggedIn = false;

  function checkSession() {
    return localStorage.getItem('party_session') === '1';
  }

  function setSession() {
    localStorage.setItem('party_session', '1');
    loggedIn = true;
  }

  function clearSession() {
    localStorage.removeItem('party_session');
    loggedIn = false;
  }

  // Login
  document.getElementById('loginBtn').addEventListener('click', function() {
    var pw = document.getElementById('loginPassword').value.trim();
    if (!pw) return;
    var btn = this;
    btn.textContent = '验证中...';
    btn.disabled = true;
    fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    }).then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok) {
          setSession();
          document.getElementById('loginError').style.display = 'none';
          document.getElementById('loginPassword').value = '';
          engine.loadData(function() {
            showView('home');
          });
        } else {
          document.getElementById('loginError').style.display = '';
          document.getElementById('loginPassword').value = '';
          document.getElementById('loginPassword').focus();
        }
        btn.textContent = '登 录';
        btn.disabled = false;
      })
      .catch(function() {
        document.getElementById('loginError').style.display = '';
        btn.textContent = '登 录';
        btn.disabled = false;
      });
  });

  // Enter key on password field
  document.getElementById('loginPassword').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('loginBtn').click();
  });

  // Logout
  document.getElementById('btnLogout').addEventListener('click', function() {
    clearSession();
    showView('login');
  });

  // Change password
  var pwModal = document.getElementById('pwModal');
  document.getElementById('btnChangePw').addEventListener('click', function() {
    document.getElementById('fAdminPw').value = '';
    document.getElementById('fNewPw').value = '';
    pwModal.classList.add('active');
    document.getElementById('fAdminPw').focus();
  });
  document.getElementById('btnPwCancel').addEventListener('click', function() {
    pwModal.classList.remove('active');
  });
  document.getElementById('btnPwSave').addEventListener('click', function() {
    var adminPw = document.getElementById('fAdminPw').value.trim();
    var newPw = document.getElementById('fNewPw').value.trim();
    if (!adminPw || !newPw) { alert('请填写完整'); return; }
    fetch('/api/auth/change', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminPassword: adminPw, newPassword: newPw })
    }).then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok) {
          alert('密码修改成功');
          pwModal.classList.remove('active');
        } else {
          alert(data.error || '修改失败');
        }
      })
      .catch(function() { alert('网络错误，请重试'); });
  });
  pwModal.addEventListener('click', function(e) {
    if (e.target === pwModal) pwModal.classList.remove('active');
  });

  // ====== Init ======
  if (checkSession()) {
    setSession();
    showView('home');
    engine.loadData(function() {});
  } else {
    showView('login');
  }
})();
</script>
<script>// Unregister old PWA service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(regs) {
    regs.forEach(function(r) { r.unregister(); });
  });
  // Clear any PWA caches
  if (window.caches) {
    caches.keys().then(function(keys) {
      keys.forEach(function(k) { caches.delete(k); });
    });
  }
}
</script>
<script>// Lazy-load XLSX only when needed (fast initial load)
var _xlsxLoaded = false;
var _xlsxLoading = false;
var _xlsxCallbacks = [];
function loadXlsx(cb) {
  if (typeof XLSX !== 'undefined') { cb(); return; }
  _xlsxCallbacks.push(cb);
  if (_xlsxLoading) return;
  _xlsxLoading = true;
  var s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
  s.onload = function() {
    _xlsxLoaded = true;
    _xlsxCallbacks.forEach(function(f) { f(); });
    _xlsxCallbacks = [];
  };
  s.onerror = function() {
    _xlsxLoading = false;
    _xlsxCallbacks = [];
    alert('Excel 组件加载失败，请检查网络后刷新重试');
  };
  document.head.appendChild(s);
}
</script>
